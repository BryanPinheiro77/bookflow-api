services:
  postgres:
    image: postgres:16
    container_name: bookflow-postgres
    environment:
      POSTGRES_DB: bookflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bookflow_postgres_data:/var/lib/postgresql/data

volumes:
  bookflow_postgres_data: